services:
  postgres:
    image: postgres:16-alpine
    container_name: amaroo-postgres
    environment:
      POSTGRES_DB: amaroo
      POSTGRES_USER: amaroo
      POSTGRES_PASSWORD: amaroo
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: amaroo-redis
    ports:
      - "6379:6379"

  meilisearch:
    image: getmeili/meilisearch:v1.13
    container_name: amaroo-meilisearch
    environment:
      MEILI_MASTER_KEY: amaroo-local-master-key
    ports:
      - "7700:7700"
    volumes:
      - meili-data:/meili_data

volumes:
  postgres-data:
  meili-data:
